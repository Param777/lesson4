name: workflow overview

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  my_self_hosted_job:
    name: my self hosted job
    runs-on: self-hosted 
    steps:
      - name: steps in self hosted runnuer
        id: selfHostedId
        shell: cmd
        run: |
          echo this a multiline comment
          echo and this has been executed from my self hosted runner
  a_simple_job:
    name: my simple job name
    runs-on: ubuntu-latest
    steps:
      - name: name of my step
        id: stepId
        run: echo "this is the first step from first job"
      - name: step with another shell
        id: shellStep
        shell: python
        run: print("this is using the python shell")
